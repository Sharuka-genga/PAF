# Smart Campus Operations Hub

## Application Properties
spring.application.name=smart-campus-hub

## PostgreSQL Neon Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smart_campus_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

## JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

## Server Configuration
server.port=${PORT:8080}

## File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=./uploads

## JWT Configuration
app.jwt.secret=${JWT_SECRET:SmartCampusHub2026SecretKeyForJWTTokenGenerationThatIsLongEnoughForHS512Algorithm}
app.jwt.expiration-ms=86400000

## OAuth2 Configuration (Google) - Set via environment variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

## CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

## Role Auto-Assignment by Email Pattern (used at signup)
## Example default admin emails: admin@smartcampus.edu, admin1@smartcampus.edu
## Example default technician emails: tech@smartcampus.edu, technician2@smartcampus.edu
app.auth.admin-email-regex=${ADMIN_EMAIL_REGEX:^(?i)admin[0-9]*@smartcampus\.edu$}
app.auth.technician-email-regex=${TECHNICIAN_EMAIL_REGEX:^(?i)(tech|technician)[0-9]*@smartcampus\.edu$}

## Logging
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN
