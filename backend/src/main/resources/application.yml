spring:
  application:
    name: smart-campus
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always



app:
  jwt:
    secret: bXktc3VwZXItc2VjcmV0LWtleS13aGljaC1pcy1hdC1sZWFzdC0yNTYtYml0cy1sb25n
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

server:
  port: 8080
  forward-headers-strategy: framework
