services:
  # PostgreSQL Database (local healthcheck proxy only — actual DB is Neon cloud)
  postgres:
    image: postgres:15-alpine
    container_name: smart-campus-postgres
    environment:
      POSTGRES_DB: smart_campus_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-campus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_campus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    env_file:
      - .env
    environment:
      # Database Configuration (Neon Cloud PostgreSQL)
      DATABASE_URL: ${NEON_DB_URL}
      DATABASE_USERNAME: ${NEON_DB_USER}
      DATABASE_PASSWORD: ${NEON_DB_PASS}

      # JWT Configuration
      JWT_SECRET: ${APP_JWT_SECRET}

      # OAuth2 Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-http://localhost:8080/login/oauth2/code/google}

      # CORS Configuration
      CORS_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}

      # Cloudinary Configuration
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # File Upload
      file.upload-dir: ./uploads

      # Role Assignment Regex
      ADMIN_EMAIL_REGEX: "^(?i)admin[0-9]*@smartcampus\\.edu$"
      TECHNICIAN_EMAIL_REGEX: "^(?i)(tech|technician)[0-9]*@smartcampus\\.edu$"

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-campus-network
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (uncomment to run in Docker)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: smart-campus-frontend
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - backend
  #   networks:
  #     - smart-campus-network

volumes:
  postgres_data:
    driver: local

networks:
  smart-campus-network:
    driver: bridge
